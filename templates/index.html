<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP延迟监测工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <style>
        .ip-card {
            margin-bottom: 1rem;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .status-up {
            color: #28a745;
        }
        .status-down {
            color: #dc3545;
        }
        .status-unknown {
            color: #6c757d;
        }
        .graph-container {
            margin-top: 1rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 5px;
        }
        .port-status {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            margin: 0.25rem;
            border-radius: 3px;
            font-size: 0.875rem;
        }
        .port-open {
            background-color: #28a745;
            color: white;
        }
        .port-closed {
            background-color: #dc3545;
            color: white;
        }
        .mtr-result {
            font-family: monospace;
            white-space: pre-wrap;
            background-color: #f8f9fa;
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1rem;
        }
        .alert-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background-color: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
        }
        .nav-tabs {
            margin-bottom: 1rem;
        }
        .chart-container {
            margin-bottom: 1rem;
        }
        .alert-item {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 3px;
            background-color: #f8f9fa;
        }
        .alert-item:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">IP延迟监测工具</h1>

        <!-- 添加IP表单 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">添加监控IP</h5>
                <form id="addIpForm">
                    <div class="mb-3">
                        <label for="ip" class="form-label">IP地址</label>
                        <input type="text" class="form-control" id="ip" required>
                    </div>
                    <div class="mb-3">
                        <label for="ports" class="form-label">端口（可选，用逗号分隔）</label>
                        <input type="text" class="form-control" id="ports" placeholder="例如: 80,443,8080">
                    </div>
                    <button type="submit" class="btn btn-primary">添加</button>
                </form>
            </div>
        </div>

        <!-- IP监控列表 -->
        <div id="ipList"></div>
    </div>

    <script>
        // 更新IP状态
        function updateStatus() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    const ipList = document.getElementById('ipList');
                    ipList.innerHTML = '';

                    Object.entries(data.monitored_ips).forEach(([ip, info]) => {
                        const card = document.createElement('div');
                        card.className = 'ip-card';
                        
                        // 计算告警数量
                        const alertCount = info.alerts ? info.alerts.length : 0;
                        
                        card.innerHTML = `
                            <div class="d-flex justify-content-between align-items-center">
                                <h5>${ip}</h5>
                                <div>
                                    <span class="status-${info.status}">${info.status.toUpperCase()}</span>
                                    ${alertCount > 0 ? `<span class="alert-badge">${alertCount}</span>` : ''}
                                    <button class="btn btn-sm btn-danger ms-2" onclick="removeIp('${ip}')">移除</button>
                                </div>
                            </div>
                            <div>
                                <p>延迟: ${info.latency ? info.latency.toFixed(2) + 'ms' : 'N/A'}</p>
                                <p>最后检查: ${info.last_check ? new Date(info.last_check).toLocaleString() : 'N/A'}</p>
                            </div>
                            ${Object.keys(info.port_status || {}).length > 0 ? `
                                <div>
                                    <h6>端口状态:</h6>
                                    ${Object.entries(info.port_status).map(([port, isOpen]) => `
                                        <span class="port-status ${isOpen ? 'port-open' : 'port-closed'}">
                                            ${port}: ${isOpen ? '开放' : '关闭'}
                                        </span>
                                    `).join('')}
                                </div>
                            ` : ''}
                            ${info.mtr_result ? `
                                <div class="mtr-result">
                                    <h6>MTR结果:</h6>
                                    <pre>${info.mtr_result.output || info.mtr_result.error}</pre>
                                </div>
                            ` : ''}
                            
                            <!-- 图表导航 -->
                            <ul class="nav nav-tabs" id="tabs-${ip}" role="tablist">
                                <li class="nav-item">
                                    <a class="nav-link active" data-bs-toggle="tab" href="#latency-${ip}" role="tab">延迟趋势</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" data-bs-toggle="tab" href="#ports-${ip}" role="tab">端口状态</a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" data-bs-toggle="tab" href="#alerts-${ip}" role="tab">告警历史</a>
                                </li>
                            </ul>
                            
                            <!-- 图表内容 -->
                            <div class="tab-content">
                                <div class="tab-pane fade show active" id="latency-${ip}" role="tabpanel">
                                    <div class="graph-container" id="graph-latency-${ip}"></div>
                                </div>
                                <div class="tab-pane fade" id="ports-${ip}" role="tabpanel">
                                    <div class="graph-container" id="graph-ports-${ip}"></div>
                                </div>
                                <div class="tab-pane fade" id="alerts-${ip}" role="tabpanel">
                                    <div class="graph-container" id="graph-alerts-${ip}"></div>
                                    <div id="alerts-list-${ip}"></div>
                                </div>
                            </div>
                            
                            <!-- 导出按钮 -->
                            <div class="mt-3">
                                <a href="/api/export/${ip}" class="btn btn-sm btn-secondary">导出数据</a>
                            </div>
                        `;
                        ipList.appendChild(card);

                        // 获取并显示图表
                        fetch(`/api/graph/${ip}/latency`)
                            .then(response => response.json())
                            .then(graphData => {
                                if (graphData.graph) {
                                    document.getElementById(`graph-latency-${ip}`).innerHTML = graphData.graph;
                                }
                            });

                        fetch(`/api/graph/${ip}/ports`)
                            .then(response => response.json())
                            .then(graphData => {
                                if (graphData.graph) {
                                    document.getElementById(`graph-ports-${ip}`).innerHTML = graphData.graph;
                                }
                            });

                        fetch(`/api/graph/${ip}/alerts`)
                            .then(response => response.json())
                            .then(graphData => {
                                if (graphData.graph) {
                                    document.getElementById(`graph-alerts-${ip}`).innerHTML = graphData.graph;
                                }
                            });

                        // 获取告警列表
                        fetch(`/api/alerts/${ip}`)
                            .then(response => response.json())
                            .then(alertData => {
                                if (alertData.alerts) {
                                    const alertsList = document.getElementById(`alerts-list-${ip}`);
                                    alertsList.innerHTML = alertData.alerts.map(alert => `
                                        <div class="alert-item">
                                            <strong>${new Date(alert.timestamp).toLocaleString()}</strong>
                                            <br>
                                            ${alert.message}
                                        </div>
                                    `).join('');
                                }
                            });
                    });
                });
        }

        // 添加IP
        document.getElementById('addIpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const ip = document.getElementById('ip').value;
            const ports = document.getElementById('ports').value
                .split(',')
                .map(p => parseInt(p.trim()))
                .filter(p => !isNaN(p));

            fetch('/api/add_ip', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ ip, ports })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    document.getElementById('ip').value = '';
                    document.getElementById('ports').value = '';
                    updateStatus();
                }
            });
        });

        // 移除IP
        function removeIp(ip) {
            fetch('/api/remove_ip', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ ip })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert(data.error);
                } else {
                    updateStatus();
                }
            });
        }

        // 定期更新状态
        setInterval(updateStatus, 3000);
        updateStatus();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
